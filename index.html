<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Scout</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

body{
background:#0b1020;
color:white;
font-family:Arial;
text-align:center;
padding-top:120px;
}

button{
background:#6f3ff5;
color:white;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin:10px;
}

#userBox{
margin-top:40px;
font-size:18px;
}

</style>

</head>

<body>

<h1>Smart Scout</h1>

<button onclick="login()">Login with Pi Wallet</button>

<div id="userBox"></div>

<br>

<button onclick="pay()">Support 1 Pi</button>

<script>

Pi.init({ version:"2.0", sandbox: false});

let authData=null;

async function login(){

const scopes=[
'username',
'payments',
'wallet_address'
];

try{

const auth=await Pi.authenticate(scopes,{

onIncompletePaymentFound:async function(payment){

console.log("Pending payment:",payment);

await fetch("/api/complete",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
paymentId:payment.identifier,
txid:payment.transaction?.txid
})
});

}

});

authData=auth;

document.getElementById("userBox").innerHTML=
"Username: "+auth.user.username+
"<br><br>"+
"Wallet: "+auth.user.wallet_address;

}catch(e){

alert("Login error "+e.message);

}

}


function pay(){

if(!authData){
alert("Login first");
return;
}

const paymentData={
amount:1,
memo:"Support Smart Scout",
metadata:{type:"support"}
};

const callbacks={

onReadyForServerApproval:async function(paymentId){

await fetch("/api/approve",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
paymentId:paymentId
})
});

},

onReadyForServerCompletion:async function(paymentId,txid){

await fetch("/api/complete",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
paymentId:paymentId,
txid:txid
})
});

alert("Payment completed");

},

onCancel:function(){
alert("Payment cancelled");
},

onError:function(err){
alert(err.message);
}

};

Pi.createPayment(paymentData,callbacks);

}

</script>

</body>
</html>
