<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scout - Pi Payment</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align: center; font-family: Arial, sans-serif; padding-top: 50px;">

    <h1>مرحباً بك في Smart Scout</h1>
    <p>اضغط الزر بالأسفل لإتمام عملية دفع تجريبية</p>
    
    <button id="pay-button" style="padding: 15px 30px; background-color: #673ab7; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer;">
        دفع 1 Pi للتجربة
    </button>

    <script>
        // 2. تهيئة الـ SDK مع تفعيل Sandbox للتجربة
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('pay-button').onclick = async function() {
            try {
                // 3. طلب تسجيل الدخول أولاً (ضروري لتفعيل الدفع)
                const scopes = ['username', 'payments'];
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                console.log("Authenticated for:", auth.user.username);

                // 4. إنشاء عملية الدفع
                const payment = Pi.createPayment({
                    amount: 1.0,
                    memo: "تجربة دفع تطبيق Smart Scout",
                    metadata: { orderId: "ABC-123" },
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        console.log("Payment ID:", paymentId);
                        // في مرحلة التجربة، السيستم سيتخطى هذه الخطوة برمجياً
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        console.log("Transaction ID:", txid);
                        alert("تمت عملية الدفع بنجاح!");
                    },
                    onCancel: function(paymentId) { console.log("Cancelled"); },
                    onError: function(error, payment) { console.error(error); },
                });
            } catch (err) {
                alert("تأكد من فتح التطبيق داخل Pi Browser");
            }
        };

        function onIncompletePaymentFound(payment) {
            console.log("هناك دفع معلق:", payment);
        }
    </script>
</body>
