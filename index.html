<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Scout</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:100px;
}

button{
background:#7c3aed;
color:white;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:8px;
cursor:pointer;
margin:10px;
}

button:hover{
background:#6d28d9;
}
</style>
</head>

<body>

<h1>Smart Scout</h1>

<button id="login">Login with Pi</button>
<br>
<button id="pay" style="display:none;">Pay 1 Pi</button>

<script>

Pi.init({
version: "2.0",
sandbox: true
});

let currentUser = null;

document.getElementById("login").onclick = async () => {

try {

const auth = await Pi.authenticate(
['username','payments'],
{
onIncompletePaymentFound: async payment => {

await fetch("/api/complete",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
paymentId: payment.identifier
})
});

}
}
);

currentUser = auth.user;

alert("Welcome " + currentUser.username);

document.getElementById("pay").style.display="inline-block";

} catch(e){

console.log(e);
alert("Login failed");

}

};

document.getElementById("pay").onclick = async () => {

const paymentData = {
amount: 1,
memo: "Smart Scout Payment",
metadata: {productId:"smartscout"}
};

const callbacks = {

onReadyForServerApproval: async paymentId => {

await fetch("/api/approve",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
paymentId:paymentId
})
});

},

onReadyForServerCompletion: async paymentId => {

await fetch("/api/complete",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
paymentId:paymentId
})
});

},

onCancel: paymentId => {

alert("Payment cancelled");

},

onError: error => {

console.log(error);

}

};

Pi.createPayment(paymentData, callbacks);

};

</script>

</body>
</html>
