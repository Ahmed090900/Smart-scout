<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>بوابة مدفوعات Pi</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

:root{
--pi-purple:#5e2a84;
--pi-gold:#ffa500;
--bg:#f2f4f8;
}

body{
font-family:Tahoma,Arial;
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
width:380px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
text-align:center;
}

.logo{
width:70px;
height:70px;
border-radius:50%;
background:var(--pi-purple);
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:20px;
}

.logo span{
color:white;
font-size:38px;
font-weight:bold;
}

h2{
color:var(--pi-purple);
margin:10px 0;
}

.user{
margin-bottom:20px;
color:#555;
}

.price{
border:2px solid var(--pi-gold);
background:#fff8e6;
border-radius:15px;
padding:15px;
margin-bottom:25px;
}

.amount{
font-size:36px;
font-weight:bold;
}

.currency{
color:var(--pi-gold);
font-weight:bold;
}

button{
background:var(--pi-purple);
color:white;
border:none;
padding:15px;
width:100%;
border-radius:40px;
font-size:18px;
cursor:pointer;
}

button:disabled{
background:#ccc;
cursor:not-allowed;
}

.status{
margin-top:15px;
min-height:20px;
font-size:14px;
}

.success{color:green}
.error{color:red}

</style>

</head>

<body>

<div class="card">

<div class="logo">
<span>π</span>
</div>

<h2>بوابة مدفوعات Pi</h2>

<div class="user">
مرحباً <b id="username">...</b>
</div>

<div class="price">
<div class="amount">1.0</div>
<div class="currency">Pi Network</div>
</div>

<button id="payBtn" disabled>تفعيل الدفع</button>

<div id="status" class="status"></div>

</div>

<script>

const Pi = window.Pi
const statusBox = document.getElementById("status")
const usernameBox = document.getElementById("username")
const payBtn = document.getElementById("payBtn")

function status(msg,type=""){
statusBox.innerText = msg
statusBox.className = "status " + type
}

/* تهيئة Pi SDK */

Pi.init({
version:"2.0",
sandbox:true
})

/* معالجة المدفوعات المعلقة */

function incomplete(payment){

console.log("Incomplete payment",payment)

}

/* تسجيل الدخول */

async function auth(){

try{

const scopes = ['username','payments']

const user = await Pi.authenticate(scopes,{
onIncompletePaymentFound: incomplete
})

usernameBox.innerText = user.user.username

status("تم الاتصال بنجاح","success")

payBtn.disabled = false

}catch(e){

console.error(e)

usernameBox.innerText="زائر"

status("فشل الاتصال بـ Pi SDK","error")

}

}

/* زر الدفع */

payBtn.onclick = function(){

const paymentData = {
amount:1.0,
memo:"Premium Upgrade",
metadata:{orderId:"order123"}
}

const callbacks = {

onReadyForServerApproval:function(paymentId){

status("بانتظار موافقة السيرفر")

fetch("/api/approve",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({paymentId})
})

},

onReadyForServerCompletion:function(paymentId){

status("تأكيد المعاملة")

fetch("/api/complete",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({paymentId})
})
.then(()=>{

status("تم الدفع بنجاح ✅","success")

payBtn.innerText="تم الدفع"

payBtn.disabled=true

})

},

onCancel:function(){

status("تم إلغاء الدفع","error")

},

onError:function(err){

console.error(err)

status("حدث خطأ أثناء الدفع","error")

}

}

Pi.createPayment(paymentData,callbacks)

}

/* بدء التطبيق */

auth()

</script>

</body>
</html>
