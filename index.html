<!doctype html>
<html lang="en" dir="ltr">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Smart Scout</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
if(window.Pi){
Pi.init({version:"2.0",sandbox:false});
}
</script>

<style>

body{
margin:0;
background:#0b1020;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

button{
padding:14px 30px;
border:none;
border-radius:30px;
background:#5a3df0;
color:white;
font-size:16px;
cursor:pointer;
margin:10px;
}

button:hover{
opacity:.9;
}

</style>

</head>

<body>

<h1>Smart Scout</h1>

<button id="loginBtn">Login with Pi</button>

<button id="payBtn" style="display:none">
Support 1 Pi
</button>

<button id="cancelBtn" style="display:none">
Cancel Pending Payment
</button>

<script>

let authData=null;
let lastPaymentId=null;

async function post(url,data){

const r=await fetch(url,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

return r.json();

}

document.getElementById("loginBtn").onclick=async()=>{

try{

const auth=await Pi.authenticate(
["username","payments"],

async function(incomplete){

if(!incomplete)return;

console.log("Pending Payment Found",incomplete);

await fetch("/api/cancel",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
paymentId:incomplete.identifier
})
});

console.log("Old payment cancelled");

}

);

authData=auth;

document.getElementById("loginBtn").style.display="none";
document.getElementById("payBtn").style.display="inline-block";
document.getElementById("cancelBtn").style.display="inline-block";

console.log("User",auth.user.username);

}catch(e){

alert("Auth error "+e.message);

}

};


document.getElementById("payBtn").onclick=async()=>{

const paymentData={

amount:1,
memo:"Support Developer",
metadata:{type:"support"}

};

const callbacks={

onReadyForServerApproval:async function(paymentId){

console.log("Approve",paymentId);

lastPaymentId=paymentId;

await post("/api/approve",{
paymentId:paymentId
});

},

onReadyForServerCompletion:async function(paymentId,txid){

console.log("Complete",paymentId,txid);

await post("/api/complete",{
paymentId:paymentId,
txid:txid
});

alert("Payment completed. Thank you!");

},

onCancel:function(){

alert("Payment cancelled");

},

onError:function(error){

console.error(error);
alert("Payment error "+error.message);

}

};

Pi.createPayment(paymentData,callbacks);

};


document.getElementById("cancelBtn").onclick=async()=>{

if(!lastPaymentId){

alert("No payment yet");

return;

}

await post("/api/cancel",{
paymentId:lastPaymentId
});

alert("Payment cancelled");

};

</script>

</body>

</html>
