<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة مدفوعات Smart Scout - Pi Network</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        /* --- التصميم الأساسي (Theme) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e; /* لون خلفية غامق ومريح */
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* لمنع السكرول */
        }

        /* --- حاوية البطاقة (Card) --- */
        .pay-card {
            background: rgba(255, 255, 255, 0.05); /* زجاجي شفاف */
            backdrop-filter: blur(10px); /* تأثير ضبابي خيالي */
            border-radius: 20px;
            padding: 40px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            
            /* --- أنيميشن ظهور البطاقة --- */
            animation: fadeInCard 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInCard {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- الشعار والعنوان --- */
        .pi-logo {
            width: 80px;
            height: 80px;
            background-color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-size: 40px;
            color: #6200ea; /* لون باي الرسمي */
            box-shadow: 0 0 20px rgba(98, 0, 234, 0.5);
            
            /* --- أنيميشن نبض الشعار --- */
            animation: pulseLogo 2s infinite;
        }

        @keyframes pulseLogo {
            0% { box-shadow: 0 0 0 0 rgba(98, 0, 234, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(98, 0, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(98, 0, 234, 0); }
        }

        h1 { font-size: 24px; margin-bottom: 10px; color: #e0e0e0; }
        .welcome-msg { color: #b0b0b0; margin-bottom: 30px; font-size: 16px; }

        /* --- حاوية المبلغ --- */
        .amount-container {
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .amount { font-size: 48px; font-weight: bold; color: #ffeb3b; } /* لون ذهبي للمبلغ */
        .currency { font-size: 20px; color: #b0b0b0; margin-right: 5px; }

        /* --- الزر الخيالي (Floating Button) --- */
        .pay-btn {
            background: linear-gradient(45deg, #6200ea, #8e24aa); /* تدرج ألوان باي */
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease; /* تنعيم كل التأثيرات */
            box-shadow: 0 5px 15px rgba(98, 0, 234, 0.3);
            position: relative;
            overflow: hidden; /* لتأثير اللمعان */
        }

        /* --- تأثير الهوفر (Hover) --- */
        .pay-btn:hover {
            transform: translateY(-3px); /* يترفع قليلاً */
            box-shadow: 0 8px 25px rgba(98, 0, 234, 0.5);
        }

        /* --- تأثير الضغط (Active) --- */
        .pay-btn:active {
            transform: translateY(1px); /* ينضغط للأسفل */
            box-shadow: 0 3px 10px rgba(98, 0, 234, 0.2);
        }

        /* --- تأثير اللمعان الخيالي (Shine Effect) --- */
        .pay-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        .pay-btn:hover::after {
            left: 100%;
            top: 100%;
            opacity: 1;
        }

        /* --- حالة التعطيل (Disabled) --- */
        .pay-btn:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* --- رسائل الحالة --- */
        .status-msg {
            margin-top: 20px;
            font-size: 14px;
            min-height: 1em; /* لمنع القفز */
        }
        .status-error { color: #ff5252; }
        .status-success { color: #4caf50; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div class="pay-card">
        <div class="pi-logo">π</div>
        <h1>بوابة مدفوعات Smart Scout</h1>
        <p class="welcome-msg">مرحباً بك في عالم Pi Network التجريبي</p>

        <div class="amount-container">
            <span class="amount">1.0</span>
            <span class="currency">Pi Network (Sandbox)</span>
        </div>

        <button class="pay-btn" id="pay-button" onclick="transferPi()" disabled>
            جاري تهيئة الـ SDK...
        </button>
        
        <p class="status-msg" id="status-message"></p>
    </div>

    <script>
        // --- متغيرات الحالة ---
        const payBtn = document.getElementById('pay-button');
        const statusMsg = document.getElementById('status-message');
        const sandboxMode = true; // نستخدم الـ Sandbox لتخطي الخطوة 10

        // --- 1. تهيئة الـ SDK (شريان الحياة) ---
        Pi.init({ version: "2.0", sandbox: sandboxMode })
            .then(() => {
                console.log("Pi SDK Initialized!");
                // تفعيل الزر وتغيير النص بأنيميشن بسيط
                payBtn.innerText = "تفعيل الدفع (1 Pi)";
                payBtn.disabled = false;
                showStatus("الـ SDK جاهز للعمل ✅", "success");
            })
            .catch((error) => {
                console.error("SDK Init failed:", error);
                payBtn.innerText = "فشل تهيئة SDK";
                showStatus("فشل الاتصال بـ Pi SDK - افتحه من Pi Browser!", "error");
            });

        // --- 2. دالة تحويل Pi (الساحر) ---
        async function transferPi() {
            // تعطيل الزر لمنع الضغط المزدوج وأنيميشن "جاري العمل"
            payBtn.disabled = true;
            payBtn.innerText = "جاري تحضير المحفظة...";
            showStatus("جاري التواصل مع شبكة باي...", "success");

            try {
                // --- ألف: إنشاء عملية الدفع (SDK Request) ---
                const payment = await Pi.createPayment({
                    amount: 1.0,
                    memo: "دفع تجريبي - تفعيل Smart Scout (Step 10)",
                    metadata: { type: "test_payment", step: "10" },
                }, {
                    // --- باء: الرد الآلي من سيرفر Vercel (الموافقة والإكمال) ---
                    
                    // 1. السيرفر يوافق على الطلب (Server Approval)
                    onReadyForServerApproval: (paymentId) => {
                        console.log("Ready for Server Approval. ID:", paymentId);
                        payBtn.innerText = "جاري موافقة السيرفر...";
                        return fetch('/api/approve', { // نستخدم المسار الصافي في Vercel
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId })
                        });
                    },

                    // 2. السيرفر يكمل المعاملة (Server Completion)
                    onReadyForServerCompletion: (paymentId, txid) => {
                        console.log("Ready for Server Completion. ID:", paymentId, "TXID:", txid);
                        payBtn.innerText = "جاري تأكيد الشبكة...";
                        return fetch('/api/complete', { // نستخدم المسار الصافي في Vercel
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid })
                        });
                    },

                    // --- جيم: التعامل مع الأخطاء والإلغاء ---
                    onCancel: (paymentId) => {
                        console.log("Payment cancelled. ID:", paymentId);
                        resetPayButton();
                        showStatus("تم إلغاء عملية الدفع من قبلك.", "error");
                    },
                    onError: (error, payment) => {
                        console.error("Payment error:", error, payment);
                        resetPayButton();
                        showStatus("حدث خطأ أثناء الدفع: " + error.message, "error");
                    }
                });

                // --- دال: نجاح العملية بالكامل (The Finale) ---
                console.log("Payment accomplished:", payment);
                payBtn.innerText = "تم الدفع بنجاح! 🎉";
                payBtn.style.background = "#4caf50"; // تحويل الزر للون الأخضر
                showStatus("مبروك! اكتمل الدفع. تحقق من الـ Checklist الآن.", "success");
                
                // يمكنك إضافة تحويل تلقائي للصفحة التالية هنا بعد ثواني
                // setTimeout(() => { window.location.href = "/success.html"; }, 3000);

            } catch (error) {
                console.error("Pi.createPayment failed:", error);
                resetPayButton();
                showStatus("فشل الدفع: " + error.message, "error");
            }
        }

        // --- دالة مساعدة لإعادة الزر لحالته الأصلية ---
        function resetPayButton() {
            payBtn.disabled = false;
            payBtn.innerText = "تفعيل الدفع (1 Pi)";
            payBtn.style.background = "linear-gradient(45deg, #6200ea, #8e24aa)";
        }

        // --- دالة مساعدة لعرض رسائل الحالة ---
        function showStatus(msg, type) {
            statusMsg.innerText = msg;
            statusMsg.className = "status-msg " + (type === "error" ? "status-error" : "status-success");
        }

    </script>
</body>
</html>
