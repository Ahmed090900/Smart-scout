<!DOCTYPE html>
<html>
<head>
<title>Smart Scout</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
Pi.init({ version: "2.0", sandbox: true });

let authResult;

async function login() {

authResult = await Pi.authenticate(
['username','payments'],
{
onIncompletePaymentFound: async payment => {

await fetch("/api/complete",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
paymentId: payment.identifier,
txid: payment.transaction?.txid
})
})

}
}
)

document.getElementById("user").innerText =
"Welcome " + authResult.user.username;

}

function pay(){

Pi.createPayment(
{
amount: 1,
memo: "Smart Scout Payment",
metadata: { product: "upgrade" }
},

{
onReadyForServerApproval: async (paymentId) => {

await fetch("/api/approve",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({ paymentId })
})

},

onReadyForServerCompletion: async (paymentId, txid) => {

await fetch("/api/complete",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
paymentId,
txid
})
})

},

onCancel: (paymentId) => {
alert("Payment cancelled");
},

onError: (error) => {
console.error(error);
alert("Payment error");
}

}

)

}

</script>

</head>

<body>

<h2>Smart Scout</h2>

<button onclick="login()">
Login with Pi
</button>

<p id="user"></p>

<br>

<button onclick="pay()">
Pay 1 Pi
</button>

</body>
</html>
