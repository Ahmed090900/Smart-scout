<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Smart Scout Payment</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
}

button{
padding:15px 25px;
font-size:18px;
background:purple;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:0.8;
}
</style>

</head>

<body>

<h1>Smart Scout</h1>
<p>اضغط الزر للدفع 1 Pi كتجربة</p>

<button id="payBtn">Pay 1 Pi</button>

<script>

Pi.init({
version: "2.0",
sandbox: true
});

document.getElementById("payBtn").addEventListener("click", function(){

const paymentData = {
amount: 1,
memo: "Smart Scout Test Payment",
metadata: {orderId: "12345"}
};

const callbacks = {

onReadyForServerApproval: function(paymentId){

fetch("/approve",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({paymentId})
})
.then(res=>res.json())
.then(data=>{
console.log("Approved",data);
});

},

onReadyForServerCompletion: function(paymentId, txid){

fetch("/complete",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({paymentId, txid})
})
.then(res=>res.json())
.then(data=>{
alert("تم الدفع بنجاح");
});

},

onCancel: function(paymentId){
alert("تم إلغاء الدفع");
},

onError: function(error,payment){
console.error(error);
alert("حدث خطأ أثناء الدفع");
}

};

Pi.createPayment(paymentData,callbacks);

});

</script>

</body>

</body>
</html>
