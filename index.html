<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scout Payment</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

        body {
            font-family: 'Cairo', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f14, #1a1a24);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: rgba(28, 28, 37, 0.95);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            width: 340px;
            box-shadow: 0 20px 60px rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.2);
            transition: all 0.4s ease;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #8b5cf6;
            letter-spacing: 1px;
        }

        .pi-icon {
            font-size: 42px;
            color: #8b5cf6;
            margin-bottom: 8px;
        }

        .user-info {
            margin: 15px 0;
            padding: 12px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 12px;
            font-size: 15px;
            display: none;
        }

        .amount {
            font-size: 26px;
            font-weight: 600;
            margin: 25px 0;
            color: #fff;
        }

        button {
            background: linear-gradient(90deg, #8b5cf6, #7c3aed);
            border: none;
            padding: 16px 30px;
            border-radius: 16px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(139, 92, 246, 0.6);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            font-size: 15px;
            color: #aaa;
            min-height: 24px;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success { color: #22c55e !important; }
        .error { color: #ef4444 !important; }
    </style>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

<div class="container">
    <div class="pi-icon">π</div>
    <div class="logo">Smart Scout</div>

    <div class="user-info" id="userInfo">
        مرحباً، <span id="username" style="color:#8b5cf6; font-weight:600;"></span> 👋
    </div>

    <div class="amount">
        المبلغ: <b>1 π</b>
    </div>

    <button id="loginBtn" onclick="loginWithPi()">ربط المحفظة (Login with Pi)</button>
    <button id="payBtn" onclick="pay()" style="display:none;">ادفع 1 π الآن</button>

    <div class="status" id="status">جاهز للربط...</div>
</div>

<script>
    // تهيئة الـ SDK - تأكد من مطابقة Sandbox مع مفتاح الـ API في السيرفر
    Pi.init({ version: "2.0", sandbox: true });

    let currentUser = null;

    async function loginWithPi() {
        const statusEl = document.getElementById("status");
        const loginBtn = document.getElementById("loginBtn");
        const payBtn = document.getElementById("payBtn");
        const userInfo = document.getElementById("userInfo");
        const usernameEl = document.getElementById("username");

        statusEl.innerHTML = 'جاري الربط<span class="spinner"></span>';

        try {
            const authResult = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
            
            currentUser = authResult.user;
            usernameEl.textContent = currentUser.username || "Pioneer";
            userInfo.style.display = "block";
            loginBtn.style.display = "none";
            payBtn.style.display = "block";

            statusEl.innerHTML = '<span class="success">تم ربط المحفظة بنجاح ✅</span>';
        } catch (error) {
            console.error("Login error:", error);
            statusEl.innerHTML = '<span class="error">فشل الربط ⚠️ تأكد من Pi Browser</span>';
        }
    }

    // معالجة المدفوعات المعلقة (Incomplete Payments)
    async function onIncompletePaymentFound(payment) {
        console.log("Found incomplete payment:", payment);
        // يمكنك إرسال هذا الـ payment للسيرفر لعمل complete إذا كان قد تم دفعه بالفعل
    };

    async function pay() {
        const statusEl = document.getElementById("status");
        const payBtn = document.getElementById("payBtn");

        if (!currentUser) {
            statusEl.innerText = "يرجى ربط المحفظة أولاً";
            return;
        }

        payBtn.disabled = true;
        statusEl.innerHTML = 'جاري معالجة الطلب<span class="spinner"></span>';

        Pi.createPayment({
            amount: 1,
            memo: "Smart Scout Premium Service",
            metadata: { orderId: "SS-" + Date.now() }
        }, {
            onReadyForServerApproval: async (paymentId) => {
                console.log("Step 1: Approval. ID:", paymentId);
                statusEl.innerHTML = 'جاري طلب موافقة السيرفر...';

                try {
                    const response = await fetch("/api/approve", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ paymentId })
                    });

                    if (!response.ok) throw new Error("السيرفر رفض الموافقة");
                    
                    console.log("Step 1 Success");
                } catch (err) {
                    statusEl.innerHTML = `<span class="error">خطأ في الموافقة: ${err.message}</span>`;
                    throw err; // يوقف العملية في SDK
                }
            },

            onReadyForServerCompletion: async (paymentId, txid) => {
                console.log("Step 2: Completion. TXID:", txid);
                statusEl.innerHTML = 'جاري تأكيد الدفع نهائياً...';

                try {
                    const response = await fetch("/api/complete", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ paymentId, txid })
                    });

                    if (!response.ok) throw new Error("فشل تأكيد العملية");

                    statusEl.innerHTML = '<span class="success">✅ تم الدفع بنجاح! شكراً لك</span>';
                    payBtn.innerText = "تمت العملية ✓";
                } catch (err) {
                    statusEl.innerHTML = `<span class="error">خطأ في الإكمال: ${err.message}</span>`;
                    throw err;
                }
            },

            onCancel: (paymentId) => {
                statusEl.innerHTML = '❌ تم إلغاء العملية';
                payBtn.disabled = false;
            },

            onError: (error, payment) => {
                console.error("SDK Error:", error);
                statusEl.innerHTML = `<span class="error">⚠️ خطأ: ${error.message}</span>`;
                payBtn.disabled = false;
            }
        });
    }
</script>

</body>
</html>
