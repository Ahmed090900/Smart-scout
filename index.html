<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scout | Pi Payment</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #2e1a47 0%, #1a1a2e 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: sans-serif; color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border-radius: 30px; padding: 40px;
            width: 90%; max-width: 400px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .btn-pay {
            background: linear-gradient(135deg, #6200ea 0%, #b388ff 100%);
            border: none; padding: 18px; width: 100%;
            border-radius: 15px; color: white; font-weight: bold;
            font-size: 18px; cursor: pointer; transition: 0.3s;
        }
        .btn-pay:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }
        #status { margin-top: 20px; font-size: 14px; color: #ffeb3b; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 50px; margin-bottom: 10px;">π</div>
    <h2>تفعيل Smart Scout</h2>
    <p>سيتم خصم 1 Pi لتفعيل المميزات</p>
    
    <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin: 20px 0;">
        <span style="font-size: 30px; color: #ffeb3b;">1.0</span> <small>Pi</small>
    </div>

    <button id="btn" class="btn-pay" onclick="startProcess()" disabled>جاري تهيئة الشبكة...</button>
    <div id="status">الرجاء الانتظار...</div>
</div>

<script>
    // تفعيل رسائل الخطأ للتصحيح في المتصفح
    window.onerror = function(msg, url, line) {
        alert("خطأ: " + msg + "\nالسطر: " + line);
        return false;
    };

    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    let currentUser = null;

    // 1. وظيفة التهيئة (تُستدعى عند اكتمال تحميل الصفحة)
    async function initPi() {
        try {
            status.innerText = "جاري الاتصال بـ Pi Network...";
            
            // تأكد من وجود المكتبة
            if (typeof Pi === 'undefined') {
                throw new Error("لم يتم العثور على Pi SDK. تأكد من فتح الرابط داخل Pi Browser.");
            }

            // تهيئة الـ SDK (استخدم sandbox: true للتجربة)
            await Pi.init({ version: "2.0", sandbox: true });
            
            // طلب الصلاحيات (Scope)
            const scopes = ['username', 'payments', 'wallet_address'];
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            currentUser = auth.user;
            btn.disabled = false;
            btn.innerText = "ادفع الآن 1 Pi";
            status.innerText = "مرحباً: " + currentUser.username;
            
        } catch (err) {
            status.innerText = "فشل الاتصال: " + err.message;
            status.style.color = "#ff5252";
        }
    }

    // 2. معالجة عملية الدفع
    async function startProcess() {
        btn.disabled = true;
        btn.innerText = "جاري فتح المحفظة...";

        try {
            const payment = await Pi.createPayment({
                amount: 1.0,
                memo: "تفعيل Smart Scout",
                metadata: { user: currentUser.username }
            }, {
                onReadyForServerApproval: async (paymentId) => {
                    return fetch('/api/approve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId })
                    });
                },
                onReadyForServerCompletion: async (paymentId, txid) => {
                    return fetch('/api/complete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, txid })
                    });
                },
                onCancel: (paymentId) => { resetBtn(); status.innerText = "تم إلغاء الدفع"; },
                onError: (error, payment) => { resetBtn(); status.innerText = "خطأ: " + error.message; }
            });

            status.innerText = "تم الدفع بنجاح! 🎉";
            btn.innerText = "تم التفعيل ✅";
        } catch (err) {
            status.innerText = "فشل العملية: " + err.message;
            resetBtn();
        }
    }

    function resetBtn() {
        btn.disabled = false;
        btn.innerText = "ادفع الآن 1 Pi";
    }

    function onIncompletePaymentFound(payment) {
        console.log("Incomplete payment found", payment);
    }

    // تشغيل التهيئة عند تحميل النافذة
    window.onload = initPi;
</script>

</body>
</html>
