<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدفوعات Pi Network</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
font-family: Arial;
background:#f0f2f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0
}

.payment-card{
background:white;
padding:30px;
border-radius:20px;
width:350px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.1)
}

.btn-pay{
background:#5e2a84;
color:white;
border:none;
padding:15px;
border-radius:40px;
font-size:18px;
width:100%;
cursor:pointer
}

.btn-pay:disabled{
background:#ccc
}

.status{
margin-top:10px
}

.success{color:green}
.error{color:red}
</style>
</head>

<body>

<div class="payment-card">

<h2>Pi Payment</h2>

<div>
مرحباً
<span id="username">...</span>
</div>

<h1>1 Pi</h1>

<button id="pay-button" class="btn-pay" disabled>
ادفع الآن
</button>

<div id="status-msg" class="status"></div>

</div>

<script>

const Pi = window.Pi;
const payButton = document.getElementById("pay-button");
const statusMsg = document.getElementById("status-msg");

Pi.init({
version:"2.0",
sandbox:true
});

async function authenticateUser(){

try{

const scopes=['username','payments'];

const auth=await Pi.authenticate(scopes,onIncompletePaymentFound);

document.getElementById("username").innerText=auth.user.username;

payButton.disabled=false;

showStatus("تم تسجيل الدخول","success");

}

catch(e){

console.error(e);

showStatus("فشل تسجيل الدخول","error");

}

}

function onIncompletePaymentFound(payment){

console.log("Incomplete payment",payment);

}

payButton.addEventListener("click",()=>{

const paymentData={
amount:1,
memo:"Test Payment",
metadata:{orderId:"123"}
};

const callbacks={

onReadyForServerApproval:(paymentId)=>{

fetch("/api/approve",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({paymentId})
});

},

onReadyForServerCompletion:(paymentId,txid)=>{

fetch("/api/complete",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({paymentId,txid})
})
.then(res=>res.json())
.then(data=>{

showStatus("تم الدفع بنجاح","success");

payButton.disabled=true;

});

},

onCancel:(paymentId)=>{

showStatus("تم إلغاء الدفع","error");

},

onError:(error)=>{

console.error(error);

showStatus("خطأ في الدفع","error");

}

};

Pi.createPayment(paymentData,callbacks);

});

function showStatus(msg,type){

statusMsg.innerText=msg;

statusMsg.className="status "+type;

}

authenticateUser();

</script>

</body>
</html>
