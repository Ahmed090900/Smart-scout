<script>
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');

    let currentUser = null;

    // 1. تهيئة Pi SDK
    async function initializePi() {
        try {
            await new Promise(resolve => setTimeout(resolve, 1000));

            if (!window.Pi) {
                throw new Error("افتح الصفحة داخل Pi Browser");
            }

            Pi.init({ version: "2.0", sandbox: true }); // غيرها false في mainnet

            const scopes = ['username', 'payments'];
            const auth = await Pi.authenticate(scopes, onIncompletePayment);

            currentUser = auth.user;

            btn.disabled = false;
            btn.innerText = "ادفع الآن 1 Pi";
            status.innerText = "مرحبًا: " + currentUser.username;

        } catch (e) {
            status.style.color = "#ff5252";
            status.innerText = "خطأ: " + e.message;
        }
    }

    // 2. بدء الدفع
    async function startProcess() {
        btn.disabled = true;
        btn.innerText = "جاري فتح المحفظة...";

        try {
            await Pi.createPayment({
                amount: 1,
                memo: "Smart Scout Activation",
                metadata: { user: currentUser.username }
            }, {

                // ✅ مهم جدًا
                onReadyForServerApproval: async (paymentId) => {
                    const res = await fetch('/api/approve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId })
                    });

                    if (!res.ok) {
                        throw new Error("فشل في الموافقة من السيرفر");
                    }

                    return res.json();
                },

                // ✅ مهم جدًا
                onReadyForServerCompletion: async (paymentId, txid) => {
                    const res = await fetch('/api/complete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, txid })
                    });

                    if (!res.ok) {
                        throw new Error("فشل في إكمال الدفع");
                    }

                    return res.json();
                },

                onCancel: () => {
                    status.innerText = "تم إلغاء الدفع";
                    resetBtn();
                },

                onError: (err) => {
                    status.innerText = "خطأ: " + err.message;
                    resetBtn();
                }

            });

            // ✅ هنا فقط بعد النجاح الحقيقي
            status.innerText = "تم الدفع بنجاح 🎉";
            btn.innerText = "تم التفعيل ✅";

        } catch (e) {
            status.innerText = "فشل الدفع: " + e.message;
            resetBtn();
        }
    }

    function resetBtn() {
        btn.disabled = false;
        btn.innerText = "ادفع الآن 1 Pi";
    }

    function onIncompletePayment(payment) {
        console.log("دفع غير مكتمل:", payment);
    }

    window.onload = initializePi;
</script>
