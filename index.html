<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scout | Pi Payment</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        /* أنيميشن الخلفية المتحركة */
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #2e1a47 0%, #1a1a2e 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Cairo', sans-serif; color: white; overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border-radius: 30px; padding: 40px;
            width: 90%; max-width: 400px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .pi-icon {
            font-size: 60px; color: #ffeb3b; margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(255, 235, 59, 0.5));
            animation: rotate 4s linear infinite;
        }
        @keyframes rotate { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        .btn-pay {
            background: linear-gradient(135deg, #6200ea 0%, #b388ff 100%);
            border: none; padding: 18px; width: 100%;
            border-radius: 15px; color: white; font-weight: bold;
            font-size: 18px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(98, 0, 234, 0.3);
        }
        .btn-pay:hover { transform: scale(1.03); box-shadow: 0 15px 30px rgba(98, 0, 234, 0.5); }
        .btn-pay:disabled { background: #444; cursor: not-allowed; }
        
        #status { margin-top: 20px; font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="card">
    <div class="pi-icon">π</div>
    <h2>تفعيل Smart Scout</h2>
    <p>سيتم خصم 1 Pi لتفعيل المميزات المتقدمة</p>
    
    <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin: 20px 0;">
        <span style="font-size: 30px; color: #ffeb3b;">1.0</span> <small>Pi</small>
    </div>

    <button id="btn" class="btn-pay" onclick="startProcess()" disabled>جاري التحقق من المحفظة...</button>
    <div id="status"></div>
</div>

<script>
    // تهيئة الـ SDK مع وضع الساند بوكس
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true });

    // 1. ربط المحفظة وطلب الصلاحيات (الـ Scopes)
    async function initAuth() {
        try {
            const scopes = ['username', 'payments', 'wallet_address'];
            const auth = await Pi.authenticate(scopes, onIncompletePayment);
            document.getElementById('btn').disabled = false;
            document.getElementById('btn').innerText = "ادفع الآن 1 Pi";
            document.getElementById('status').innerText = "المحفظة متصلة: " + auth.user.username;
        } catch (e) {
            document.getElementById('status').innerText = "خطأ في الربط: " + e.message;
        }
    }

    // 2. دالة الدفع (تستدعي ملفات الـ API في فيرسيل)
    async function startProcess() {
        const btn = document.getElementById('btn');
        btn.disabled = true;
        btn.innerText = "جاري المعالجة...";

        try {
            const payment = await Pi.createPayment({
                amount: 1.0,
                memo: "Activation for Smart Scout",
                metadata: { internal_id: "user_001" }
            }, {
                onReadyForServerApproval: (id) => {
                    return fetch('/api/approve', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ paymentId: id })
                    });
                },
                onReadyForServerCompletion: (id, txid) => {
                    return fetch('/api/complete', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ paymentId: id, txid })
                    });
                },
                onCancel: (id) => { btn.disabled = false; btn.innerText = "ادفع الآن 1 Pi"; },
                onError: (err) => { alert("Error: " + err.message); btn.disabled = false; }
            });
            
            document.getElementById('status').innerText = "تم الدفع بنجاح! 🎉";
            btn.innerText = "تم التفعيل ✅";
        } catch (e) {
            alert(e.message);
            btn.disabled = false;
        }
    }

    function onIncompletePayment(payment) { console.log("Payment pending:", payment); }

    // ابدأ الربط فوراً
    initAuth();
</script>

</body>
</html>
